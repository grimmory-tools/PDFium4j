name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-hardened-deps:
    name: Prepare Hardened Dependencies (${{ matrix.libc }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        include:
          - libc: glibc
            arch: x64
            image: ubuntu:22.04
            docker_platform: linux/amd64
          - libc: glibc
            arch: arm64
            image: ubuntu:22.04
            docker_platform: linux/arm64
          - libc: musl
            arch: x64
            image: alpine:latest
            docker_platform: linux/amd64
          - libc: musl
            arch: arm64
            image: alpine:latest
            docker_platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Cache Key Calculation
        id: cache-key
        run: echo "key=hardened-deps-${{ matrix.libc }}-${{ matrix.arch }}-v1.3.1-v3.1.4.1" >> $GITHUB_OUTPUT
      - name: Restore Cache
        id: cache-restore
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: ${{ steps.cache-key.outputs.key }}
      - name: Build Static Libraries
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/hardened-libs
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD/build/hardened-libs":/output ${{ matrix.image }} sh -c "
            # Install build tools
            if command -v apk >/dev/null; then
              apk add --no-cache cmake make g++ curl tar pkgconf
            else
              apt-get update && apt-get install -y cmake make g++ curl tar pkg-config
            fi

            mkdir -p /tmp/deps && cd /tmp/deps

            # Build ZLIB
            curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar xz
            cd zlib-1.3.1 && ./configure --static && make -j\$(nproc) CFLAGS='-fPIC' && make install DESTDIR=/tmp/install && cd ..

            # Build LIBJPEG-TURBO
            curl -L https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.1.4.1.tar.gz | tar xz
            cd libjpeg-turbo-3.1.4.1 && mkdir build && cd build
            cmake .. -G 'Unix Makefiles' -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=lib -DENABLE_SHARED=OFF -DENABLE_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DREQUIRE_SIMD=OFF
            make -j\$(nproc) && make install DESTDIR=/tmp/install

            # Package the results
            mkdir -p /output/lib /output/include /output/lib/pkgconfig
            cp -r /tmp/install/usr/local/include/* /output/include/
            cp -r /tmp/install/usr/local/lib/*.a /output/lib/
            cp -r /tmp/install/usr/local/lib/pkgconfig/*.pc /output/lib/pkgconfig/
          "

  build:
    name: Build on ${{ matrix.os }} (${{ matrix.platform }})
    needs: [prepare-hardened-deps]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
            arch: x64
            skipTests: false
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            arch: arm64
            skipTests: false
          - os: macos-15-intel
            platform: darwin-x64
            arch: x64
            skipTests: true
          - os: macos-15
            platform: darwin-arm64
            arch: arm64
            skipTests: false
          - os: windows-2025
            platform: windows-x64
            arch: x64
            skipTests: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Restore Hardened Deps (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: hardened-deps-glibc-${{ matrix.arch }}-v1.3.1-v3.1.4.1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Use our hardened static libraries
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp -r build/hardened-libs/include/* /usr/local/include/
          sudo cp -r build/hardened-libs/lib/* /usr/local/lib/
          echo "ZLIB_ROOT=/usr/local" >> $GITHUB_ENV
          echo "JPEG_ROOT=/usr/local" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jpeg-turbo
          echo "JPEG_ROOT=$(brew --prefix jpeg-turbo)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install zlib:x64-windows libjpeg-turbo:x64-windows
          echo "ZLIB_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV
          echo "JPEG_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.3.0

      - name: Cache PDFium binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Build, Test and Verify
        run: ./gradlew clean check jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all ${{ matrix.skipTests && '-x test' || '' }}

      - name: Run allocation tests
        if: ${{ !matrix.skipTests }}
        run: ./gradlew allocationTests -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        if: always()
        with:
          name: test-results-${{ matrix.platform }}
          path: '**/build/reports/tests/**'

      - name: Upload JARs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        if: success()
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

      - name: Upload Shims (for publishing)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        if: success()
        with:
          name: pdfium4j-shims-${{ matrix.platform }}
          path: build/generated-natives/natives/${{ matrix.platform }}/*

  verify-musl-hardening:
    name: Verify Musl Hardening (${{ matrix.arch }})
    needs: [prepare-hardened-deps]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        include:
          - arch: x64
            platform: linux-musl-x64
            docker_platform: linux/amd64
          - arch: arm64
            platform: linux-musl-arm64
            docker_platform: linux/arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Restore Hardened Deps (Musl)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: hardened-deps-musl-${{ matrix.arch }}-v1.3.1-v3.1.4.1
      - name: Build and Verify Static Linkage
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD":/workspace -w /workspace \
            gradle:9.4.1-jdk25-alpine \
            sh -c "apk add --no-cache cmake make g++ pkgconf && \
                  # Use our hardened static libraries
                  mkdir -p /usr/local/include /usr/local/lib && \
                  cp -r build/hardened-libs/include/* /usr/local/include/ && \
                  cp -r build/hardened-libs/lib/* /usr/local/lib/ && \
                  ./gradlew buildShim jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} -DZLIB_ROOT=/usr/local -DJPEG_ROOT=/usr/local && \
                  echo '--- VERIFYING SHIM LINKAGE ---' && \
                  SHIM_PATH=\$(find build/shim-build/${{ matrix.platform }} -name 'pdfium4j_shim.so') && \
                  ldd \$SHIM_PATH && \
                  ! ldd \$SHIM_PATH | grep -q 'libz.so' || (echo 'ERROR: libz.so dynamic dependency detected in shim!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libjpeg.so' || (echo 'ERROR: libjpeg.so dynamic dependency detected in shim!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libstdc++.so' || (echo 'ERROR: libstdc++.so dynamic dependency detected in shim!' && exit 1) && \
                  echo '--- VERIFYING PDFIUM LINKAGE ---' && \
                  PDFIUM_PATH=\$(find build/pdfium-env-${{ matrix.platform }} -name 'libpdfium.so') && \
                  ldd \$PDFIUM_PATH && \
                  ! ldd \$PDFIUM_PATH | grep -q 'libstdc++.so' || (echo 'WARNING: libpdfium.so has dynamic libstdc++ dependency' && exit 0) && \
                  echo 'Success: No problematic dynamic dependencies detected.'"

      - name: Upload Musl JARs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        if: success()
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

      - name: Upload Musl Shims (for publishing)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        if: success()
        with:
          name: pdfium4j-shims-${{ matrix.platform }}
          path: build/generated-natives/natives/${{ matrix.platform }}/*

  verify-dist-glibc:
    name: Smoke Test (Ubuntu - ${{ matrix.arch }})
    needs: [build]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Download Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.7
        with:
          name: pdfium4j-jars-linux-${{ matrix.arch }}
          path: build/libs
      - name: Run Standalone Smoke Test
        run: |
          docker run --rm --platform ${{ matrix.arch == 'arm64' && 'linux/arm64' || 'linux/amd64' }} -v "$PWD":/workspace -w /workspace eclipse-temurin:25-jdk \
            sh -c "cd /workspace && \
                  CP=\$(ls build/libs/*.jar | tr '\n' ':')src/test/java && \
                  javac --enable-preview --release 25 -cp \"\$CP\" src/test/java/org/grimmory/pdfium4j/NativeSmokeTest.java && \
                  java --enable-preview --enable-native-access=ALL-UNNAMED -cp \"\$CP\" org.grimmory.pdfium4j.NativeSmokeTest"

  verify-dist-musl:
    name: Smoke Test (Alpine - ${{ matrix.arch }})
    needs: [verify-musl-hardening]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Download Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.7
        with:
          name: pdfium4j-jars-linux-musl-${{ matrix.arch }}
          path: build/libs
      - name: Run Standalone Smoke Test
        run: |
          docker run --rm --platform ${{ matrix.arch == 'arm64' && 'linux/arm64' || 'linux/amd64' }} -v "$PWD":/workspace -w /workspace eclipse-temurin:25-jdk-alpine \
            sh -c "cd /workspace && \
                  CP=\$(ls build/libs/*.jar | tr '\n' ':')src/test/java && \
                  javac --enable-preview --release 25 -cp \"\$CP\" src/test/java/org/grimmory/pdfium4j/NativeSmokeTest.java && \
                  java --enable-preview --enable-native-access=ALL-UNNAMED -cp \"\$CP\" org.grimmory.pdfium4j.NativeSmokeTest"
