name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            skipTests: false
          - os: macos-15-intel
            platform: darwin-x64
            skipTests: true
          - os: macos-latest
            platform: darwin-arm64
            skipTests: false
          - os: windows-latest
            platform: windows-x64
            skipTests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev qpdf poppler-utils

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jpeg-turbo

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install zlib:x64-windows libjpeg-turbo:x64-windows
          echo "ZLIB_ROOT=C:/vcpkg/installed/x64-windows" >> $GITHUB_ENV
          echo "JPEG_ROOT=C:/vcpkg/installed/x64-windows" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@6f229686ee4375cc4a86b2514c89bac4930e82c4 # v5.0.0

      - name: Cache PDFium binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Build, Test and Verify
        run: ./gradlew clean check verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all ${{ matrix.skipTests && '-x test' || '' }}

      - name: Run allocation tests
        if: ${{ !matrix.skipTests }}
        run: ./gradlew allocationTests -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.platform }}
          path: '**/build/reports/tests/**'
