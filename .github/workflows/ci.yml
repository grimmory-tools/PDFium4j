name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2 # v6.0.2

      - uses: actions/setup-java@be666c2 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@6f22968 # v5

      - run: ./gradlew build

      - uses: actions/upload-artifact@bbbca2d # v6
        if: always()
        with:
          name: test-results
          path: build/reports/tests/
