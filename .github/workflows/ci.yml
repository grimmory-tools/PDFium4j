name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            skipTests: false
          - os: macos-15-intel
            platform: darwin-x64
            skipTests: true
          - os: macos-latest
            platform: darwin-arm64
            skipTests: false
          - os: windows-latest
            platform: windows-x64
            skipTests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev qpdf poppler-utils
          echo "ZLIB_ROOT=/usr" >> $GITHUB_ENV
          echo "JPEG_ROOT=/usr" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jpeg-turbo
          echo "JPEG_ROOT=$(brew --prefix jpeg-turbo)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install zlib:x64-windows libjpeg-turbo:x64-windows
          echo "ZLIB_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV
          echo "JPEG_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@6f229686ee4375cc4a86b2514c89bac4930e82c4 # v5.0.0

      - name: Cache PDFium binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Build, Test and Verify
        run: ./gradlew clean check verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all ${{ matrix.skipTests && '-x test' || '' }}

      - name: Run allocation tests
        if: ${{ !matrix.skipTests }}
        run: ./gradlew allocationTests -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.platform }}
          path: '**/build/reports/tests/**'

      - name: Upload JARs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

  verify-musl-hardening:
    name: Verify Musl Hardening (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            platform: linux-musl-x64
            docker_platform: linux/amd64
          # - arch: arm64
          #   platform: linux-musl-arm64
          #   docker_platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.3.0
      - name: Build and Verify Static Linkage
        run: |
          # Optimization: On ARM64, system static libs are usually PIC-compliant.
          # We only build from source on x64 to fix the relocation issues.
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD":/workspace -w /workspace \
            gradle:9.4.1-jdk25-alpine \
            sh -c "if [ \"${{ matrix.arch }}\" = \"x64\" ]; then \
                    apk add --no-cache cmake make g++ curl tar pkgconf && \
                    mkdir -p build/deps && cd build/deps && \
                    curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar xz && \
                    cd zlib-1.3.1 && ./configure --static && make -j$(nproc) CFLAGS='-fPIC' && make install && cd .. && \
                    curl -L https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.1.4.1.tar.gz | tar xz && \
                    cd libjpeg-turbo-3.1.4.1 && mkdir build && cd build && \
                    cmake .. -G 'Unix Makefiles' -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=lib -DENABLE_SHARED=OFF -DENABLE_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DREQUIRE_SIMD=OFF && \
                    make -j$(nproc) && make install && \
                    cp -f lib/libjpeg.a /usr/local/lib/ || true && \
                    mkdir -p /usr/local/lib/pkgconfig && cp -f lib/pkgconfig/libjpeg.pc /usr/local/lib/pkgconfig/ || true && \
                    cd /workspace; \
                  else \
                    # ARM64 is much faster with system libs
                    apk add --no-cache cmake make g++ pkgconf zlib-dev zlib-static libjpeg-turbo-dev libjpeg-turbo-static; \
                  fi && \
                  ./gradlew buildShim jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} -DZLIB_ROOT=/usr/local -DJPEG_ROOT=/usr/local && \
                  echo '--- VERIFYING LINKAGE ---' && \
                  SHIM_PATH=\$(find build/shim-build/${{ matrix.platform }} -name 'pdfium4j_shim.so') && \
                  ldd \$SHIM_PATH && \
                  ! ldd \$SHIM_PATH | grep -q 'libz.so' || (echo 'ERROR: libz.so dynamic dependency detected!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libjpeg.so' || (echo 'ERROR: libjpeg.so dynamic dependency detected!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libstdc++.so' || (echo 'ERROR: libstdc++.so dynamic dependency detected!' && exit 1) && \
                  echo 'Success: No dynamic dependencies for zlib/jpeg/stdc++ detected.'"

      - name: Upload Musl JARs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

  verify-distribution:
    name: Final Smoke Test (${{ matrix.os }} - ${{ matrix.arch }})
    needs: [build, verify-musl-hardening]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: x64
            image: eclipse-temurin:25-jdk
            proj_platform: linux-x64
            docker_platform: linux/amd64
          - os: alpine
            arch: x64
            image: eclipse-temurin:25-jdk-alpine
            proj_platform: linux-musl-x64
            docker_platform: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.3.0
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdfium4j-jars-${{ matrix.proj_platform }}
          path: build/libs
      - name: Run Standalone Smoke Test
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD":/workspace -w /workspace ${{ matrix.image }} \
            sh -c "cd /workspace && \
                  # Build a classpath including ALL downloaded jars
                  CP=\$(ls build/libs/*.jar | tr '\n' ':')src/test/java && \
                  # Compile with Java 25 preview enabled
                  javac --enable-preview --release 25 -cp \"\$CP\" src/test/java/org/grimmory/pdfium4j/NativeSmokeTest.java && \
                  # Run with native access and preview enabled
                  java --enable-preview --enable-native-access=ALL-UNNAMED -cp \"\$CP\" org.grimmory.pdfium4j.NativeSmokeTest"
