name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-hardened-deps:
    name: Prepare Hardened Dependencies (${{ matrix.libc }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - libc: glibc
            image: ubuntu:22.04
          - libc: musl
            image: alpine:latest
    steps:
      - name: Cache Key Calculation
        id: cache-key
        run: echo "key=hardened-deps-${{ matrix.libc }}-v1.3.1-v3.1.4.1" >> $GITHUB_OUTPUT
      - name: Restore Cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: build/hardened-libs
          key: ${{ steps.cache-key.outputs.key }}
      - name: Build Static Libraries
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/hardened-libs
          docker run --rm -v "$PWD/build/hardened-libs":/output ${{ matrix.image }} sh -c "
            # Install build tools
            if command -v apk >/dev/null; then
              apk add --no-cache cmake make g++ curl tar pkgconf
            else
              apt-get update && apt-get install -y cmake make g++ curl tar pkg-config
            fi

            mkdir -p /tmp/deps && cd /tmp/deps

            # Build ZLIB
            curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar xz
            cd zlib-1.3.1 && ./configure --static && make -j\$(nproc) CFLAGS='-fPIC' && make install DESTDIR=/tmp/install && cd ..

            # Build LIBJPEG-TURBO
            curl -L https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.1.4.1.tar.gz | tar xz
            cd libjpeg-turbo-3.1.4.1 && mkdir build && cd build
            cmake .. -G 'Unix Makefiles' -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=lib -DENABLE_SHARED=OFF -DENABLE_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DREQUIRE_SIMD=OFF
            make -j\$(nproc) && make install DESTDIR=/tmp/install

            # Package the results
            mkdir -p /output/lib /output/include /output/lib/pkgconfig
            cp -r /tmp/install/usr/local/include/* /output/include/
            cp -r /tmp/install/usr/local/lib/*.a /output/lib/
            cp -r /tmp/install/usr/local/lib/pkgconfig/*.pc /output/lib/pkgconfig/
          "

  build:
    name: Build on ${{ matrix.os }} (${{ matrix.platform }})
    needs: [prepare-hardened-deps]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            skipTests: false
          - os: macos-15-intel
            platform: darwin-x64
            skipTests: true
          - os: macos-latest
            platform: darwin-arm64
            skipTests: false
          - os: windows-latest
            platform: windows-x64
            skipTests: true

    steps:
      - uses: actions/checkout@v4

      - name: Restore Hardened Deps (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: build/hardened-libs
          key: hardened-deps-glibc-v1.3.1-v3.1.4.1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qpdf poppler-utils
          # Use our hardened static libraries
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp -r build/hardened-libs/include/* /usr/local/include/
          sudo cp -r build/hardened-libs/lib/* /usr/local/lib/
          echo "ZLIB_ROOT=/usr/local" >> $GITHUB_ENV
          echo "JPEG_ROOT=/usr/local" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jpeg-turbo
          echo "JPEG_ROOT=$(brew --prefix jpeg-turbo)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install zlib:x64-windows libjpeg-turbo:x64-windows
          echo "ZLIB_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV
          echo "JPEG_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@6f229686ee4375cc4a86b2514c89bac4930e82c4 # v5.0.0

      - name: Cache PDFium binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Build, Test and Verify
        run: ./gradlew clean check jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all ${{ matrix.skipTests && '-x test' || '' }}

      - name: Run allocation tests
        if: ${{ !matrix.skipTests }}
        run: ./gradlew allocationTests -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.platform }}
          path: '**/build/reports/tests/**'

      - name: Upload JARs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

  verify-musl-hardening:
    name: Verify Musl Hardening (${{ matrix.arch }})
    needs: [prepare-hardened-deps]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            platform: linux-musl-x64
            docker_platform: linux/amd64
          # - arch: arm64
          #   platform: linux-musl-arm64
          #   docker_platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Restore Hardened Deps (Musl)
        uses: actions/cache@v4
        with:
          path: build/hardened-libs
          key: hardened-deps-musl-v1.3.1-v3.1.4.1
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.3.0
      - name: Build and Verify Static Linkage
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD":/workspace -w /workspace \
            gradle:9.4.1-jdk25-alpine \
            sh -c "apk add --no-cache cmake make g++ pkgconf && \
                  # Use our hardened static libraries
                  mkdir -p /usr/local/include /usr/local/lib && \
                  cp -r build/hardened-libs/include/* /usr/local/include/ && \
                  cp -r build/hardened-libs/lib/* /usr/local/lib/ && \
                  ./gradlew buildShim jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} -DZLIB_ROOT=/usr/local -DJPEG_ROOT=/usr/local && \
                  echo '--- VERIFYING LINKAGE ---' && \
                  SHIM_PATH=\$(find build/shim-build/${{ matrix.platform }} -name 'pdfium4j_shim.so') && \
                  ldd \$SHIM_PATH && \
                  ! ldd \$SHIM_PATH | grep -q 'libz.so' || (echo 'ERROR: libz.so dynamic dependency detected!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libjpeg.so' || (echo 'ERROR: libjpeg.so dynamic dependency detected!' && exit 1) && \
                  ! ldd \$SHIM_PATH | grep -q 'libstdc++.so' || (echo 'ERROR: libstdc++.so dynamic dependency detected!' && exit 1) && \
                  echo 'Success: No dynamic dependencies for zlib/jpeg/stdc++ detected.'"

      - name: Upload Musl JARs
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfium4j-jars-${{ matrix.platform }}
          path: build/libs/*.jar

  verify-dist-glibc:
    name: Smoke Test (Ubuntu - x64)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdfium4j-jars-linux-x64
          path: build/libs
      - name: Run Standalone Smoke Test
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace eclipse-temurin:25-jdk \
            sh -c "cd /workspace && \
                  CP=\$(ls build/libs/*.jar | tr '\n' ':')src/test/java && \
                  javac --enable-preview --release 25 -cp \"\$CP\" src/test/java/org/grimmory/pdfium4j/NativeSmokeTest.java && \
                  java --enable-preview --enable-native-access=ALL-UNNAMED -cp \"\$CP\" org.grimmory.pdfium4j.NativeSmokeTest"

  verify-dist-musl:
    name: Smoke Test (Alpine - x64)
    needs: [verify-musl-hardening]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdfium4j-jars-linux-musl-x64
          path: build/libs
      - name: Run Standalone Smoke Test
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace eclipse-temurin:25-jdk-alpine \
            sh -c "cd /workspace && \
                  CP=\$(ls build/libs/*.jar | tr '\n' ':')src/test/java && \
                  javac --enable-preview --release 25 -cp \"\$CP\" src/test/java/org/grimmory/pdfium4j/NativeSmokeTest.java && \
                  java --enable-preview --enable-native-access=ALL-UNNAMED -cp \"\$CP\" org.grimmory.pdfium4j.NativeSmokeTest"
