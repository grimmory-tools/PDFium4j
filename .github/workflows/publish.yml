name: Publish

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-hardened-deps:
    name: Prepare Hardened Dependencies (${{ matrix.libc }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        include:
          - libc: glibc
            arch: x64
            image: ubuntu:22.04
            docker_platform: linux/amd64
          - libc: glibc
            arch: arm64
            image: ubuntu:22.04
            docker_platform: linux/arm64
          - libc: musl
            arch: x64
            image: alpine:latest
            docker_platform: linux/amd64
          - libc: musl
            arch: arm64
            image: alpine:latest
            docker_platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Cache Key Calculation
        id: cache-key
        run: echo "key=hardened-deps-${{ matrix.libc }}-${{ matrix.arch }}-v1.3.1-v3.1.4.1" >> $GITHUB_OUTPUT
      - name: Restore Cache
        id: cache-restore
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: ${{ steps.cache-key.outputs.key }}
      - name: Build Static Libraries
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/hardened-libs
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD/build/hardened-libs":/output ${{ matrix.image }} sh -c "
            # Install build tools
            if command -v apk >/dev/null; then
              apk add --no-cache cmake make g++ curl tar pkgconf
            else
              apt-get update && apt-get install -y cmake make g++ curl tar pkg-config
            fi

            mkdir -p /tmp/deps && cd /tmp/deps

            # Build ZLIB
            curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar xz
            cd zlib-1.3.1 && ./configure --static && make -j\$(nproc) CFLAGS='-fPIC' && make install DESTDIR=/tmp/install && cd ..

            # Build LIBJPEG-TURBO
            curl -L https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.1.4.1.tar.gz | tar xz
            cd libjpeg-turbo-3.1.4.1 && mkdir build && cd build
            cmake .. -G 'Unix Makefiles' -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=lib -DENABLE_SHARED=OFF -DENABLE_STATIC=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DREQUIRE_SIMD=OFF
            make -j\$(nproc) && make install DESTDIR=/tmp/install

            # Package the results
            mkdir -p /output/lib /output/include /output/lib/pkgconfig
            cp -r /tmp/install/usr/local/include/* /output/include/
            cp -r /tmp/install/usr/local/lib/*.a /output/lib/
            cp -r /tmp/install/usr/local/lib/pkgconfig/*.pc /output/lib/pkgconfig/
          "

  build-native-artifacts:
    name: Build ${{ matrix.platform }}
    needs: [prepare-hardened-deps]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            arch: arm64
          - os: macos-15-intel
            platform: darwin-x64
            arch: x64
          - os: macos-15
            platform: darwin-arm64
            arch: arm64
          - os: windows-2025
            platform: windows-x64
            arch: x64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Restore Hardened Deps (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: hardened-deps-glibc-${{ matrix.arch }}-v1.3.1-v3.1.4.1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp -r build/hardened-libs/include/* /usr/local/include/
          sudo cp -r build/hardened-libs/lib/* /usr/local/lib/
          echo "ZLIB_ROOT=/usr/local" >> $GITHUB_ENV
          echo "JPEG_ROOT=/usr/local" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jpeg-turbo
          echo "JPEG_ROOT=$(brew --prefix jpeg-turbo)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install zlib:x64-windows libjpeg-turbo:x64-windows
          echo "ZLIB_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV
          echo "JPEG_ROOT=$VCPKG_INSTALLATION_ROOT/installed/x64-windows" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.3.0

      - name: Build shim
        run: ./gradlew buildShim jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload Shims
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: pdfium4j-shims-${{ matrix.platform }}
          path: build/generated-natives/natives/${{ matrix.platform }}/*

  build-musl-artifacts:
    name: Build ${{ matrix.platform }}
    needs: [prepare-hardened-deps]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        include:
          - arch: x64
            platform: linux-musl-x64
            docker_platform: linux/amd64
          - arch: arm64
            platform: linux-musl-arm64
            docker_platform: linux/arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Restore Hardened Deps (Musl)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: build/hardened-libs
          key: hardened-deps-musl-${{ matrix.arch }}-v1.3.1-v3.1.4.1
      - name: Build and Verify
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} -v "$PWD":/workspace -w /workspace \
            gradle:9.4.1-jdk25-alpine \
            sh -c "apk add --no-cache cmake make g++ pkgconf && \
                  mkdir -p /usr/local/include /usr/local/lib && \
                  cp -r build/hardened-libs/include/* /usr/local/include/ && \
                  cp -r build/hardened-libs/lib/* /usr/local/lib/ && \
                  ./gradlew buildShim jar verifyNativeJars -PpdfiumPlatformFilter=${{ matrix.platform }} -DZLIB_ROOT=/usr/local -DJPEG_ROOT=/usr/local"

      - name: Upload Musl Shims
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: pdfium4j-shims-${{ matrix.platform }}
          path: build/generated-natives/natives/${{ matrix.platform }}/*

  publish:
    name: Publish to Maven Central
    needs: [build-native-artifacts, build-musl-artifacts]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Download all shims
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.7
        with:
          pattern: pdfium4j-shims-*
          path: build/prebuilt-shims
          merge-multiple: false

      - name: Reorganize shims
        run: |
          cd build/prebuilt-shims
          for d in pdfium4j-shims-*; do
            platform=${d#pdfium4j-shims-}
            mkdir -p "$platform"
            mv "$d"/* "$platform"/
            rmdir "$d"
          done

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.3.0

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" build.gradle.kts
          echo "Publishing version: $VERSION"

      - name: Publish
        run: ./gradlew publishAggregationToCentralPortal -PprebuiltShimsDir=build/prebuilt-shims
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Stage unique native release assets
        run: |
          set -euo pipefail
          rm -rf build/release-natives
          mkdir -p build/release-natives

          for platform_dir in build/generated-natives/natives/*; do
            if [[ ! -d "$platform_dir" ]]; then
              continue
            fi
            platform="$(basename "$platform_dir")"

            for asset in "$platform_dir"/*; do
              if [[ ! -f "$asset" ]]; then
                continue
              fi
              base="$(basename "$asset")"
              # Only include important binaries and licenses
              if [[ "$base" == *"pdfium"* || "$base" == *"shim"* || "$base" == *"LICENSE"* || "$base" == *"NOTICE"* || "$base" == "native-libs.txt" ]]; then
                cp "$asset" "build/release-natives/${platform}-${base}"
              fi
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.3.2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            build/libs/*.jar
            build/release-natives/*
