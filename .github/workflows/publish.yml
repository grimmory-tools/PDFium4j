name: Publish

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-native-artifacts:
    name: Build native artifacts (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-latest
            platform: linux-musl-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: ubuntu-24.04-arm
            platform: linux-musl-arm64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v5.0.0

      - name: Cache PDFium binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Build shim for platform
        run: ./gradlew buildShim generateNativeIndex -PpdfiumPlatformFilter=${{ matrix.platform }} --warning-mode all

      - name: Upload native directory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-dir-${{ matrix.platform }}
          path: build/generated-natives/natives
          if-no-files-found: error

  publish:
    needs: build-native-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v5.0.0

      - name: Download native artifact directories
        uses: actions/download-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.0
        with:
          pattern: native-dir-*
          path: build/generated-natives/natives
          merge-multiple: true

      - name: Cache PDFium binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/pdfium-archives
          key: pdfium-${{ hashFiles('build.gradle.kts') }}

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Invalid version tag: $VERSION"
            exit 1
          fi
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" build.gradle.kts
          echo "Publishing version: $VERSION"

      - run: ./gradlew verifyNativeJars build -x test --warning-mode all

      - run: ./gradlew publishAggregationToCentralPortal
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.3.2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            build/libs/*.jar
            build/pdfium-archives/*.tgz
            build/generated-natives/natives/**/*.so
            build/generated-natives/natives/**/*.dylib
            build/generated-natives/natives/**/*.dll
            build/generated-natives/natives/**/native-libs.txt
